version: 2.1

parameters:
  run_commit:
    default: true
    type: boolean
  run_commit_main:
    default: "run_if_on_main"
    type: enum
    enum: ["run_if_on_main", "run", "skip"]
  run_delivery_beta:
    default: false
    type: boolean
  run_promotion:
    default: false
    type: boolean

executors:
  python:
    docker:
      - image: cimg/python:3.11
