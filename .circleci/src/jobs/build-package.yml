executor: python
steps:
  - checkout
  - run:
      name: Sync to latest commit (picks up the version bump tag from bump-version)
      command: |
        git fetch origin "${CIRCLE_BRANCH}" --tags
        git checkout "origin/${CIRCLE_BRANCH}"
  - attach_workspace:
      at: .
  - activate-venv
  - run:
      name: Build lunes-cms package
      command: |
        pip install .
        python -m build --sdist .
        python -m build --wheel .
  - persist_to_workspace:
      root: .
      paths:
        - dist
  - notify
