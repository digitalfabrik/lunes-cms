docker:
  - image: cimg/python:3.11
steps:
  - checkout
  - attach_workspace:
      at: .
  - run:
      name: Use alternative README.md file
      command: mv lunes_cms/README.md .
  - run:
      name: Build lunes-cms package
      command: |
        source .venv/bin/activate
        pip install .
        python -m build --sdist .
        python -m build --wheel .
  - persist_to_workspace:
      root: .
      paths:
        - dist
