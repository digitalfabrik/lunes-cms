parameters:
  persist_docs:
    type: boolean
    default: false
docker:
  - image: cimg/python:3.11
    environment:
      LUNES_CMS_SECRET_KEY: circleci-dummy-key
      LUNES_CMS_DEBUG: "True"
  - image: cimg/postgres:15.1
    environment:
      POSTGRES_USER: lunes
      POSTGRES_DB: lunes
      POSTGRES_PASSWORD: password
steps:
  - checkout
  - attach_workspace:
      at: .
  - restore_cache:
      key: pip-e2e-{{ checksum "pyproject.toml" }}-v1
  - activate-venv
  - run:
      name: Install e2e dependencies
      command: pip install -e ".[e2e]"
  - run:
      name: Install system dependencies
      command: sudo apt-get update && sudo apt-get install -y ffmpeg
  - run:
      name: Install Playwright system dependencies
      command: sudo .venv/bin/python -m playwright install-deps chromium
  - run:
      name: Install Playwright browser
      command: python -m playwright install chromium
  - save_cache:
      key: pip-e2e-{{ checksum "pyproject.toml" }}-v1
      paths:
        - .venv
        - /home/circleci/.cache/ms-playwright
  - run:
      name: Migrate database
      command: lunes-cms-cli migrate
  - run:
      name: Load basic test data
      command: lunes-cms-cli loaddata lunes_cms/cms/fixtures/test_data.json
  - run:
      name: Start Django server
      command: lunes-cms-cli runserver --noreload 0.0.0.0:8080
      background: true
  - run:
      name: Wait for Django server
      command: dockerize -wait http://localhost:8080 -timeout 120s
  - run:
      name: Run e2e tests
      command: pytest e2e-tests/ -m e2e --generate=all --junitxml=test-results/e2e-junit.xml
  - store_test_results:
      path: test-results
  - when:
      condition: << parameters.persist_docs >>
      steps:
        - persist_to_workspace:
            root: .
            paths:
              - user_docs
