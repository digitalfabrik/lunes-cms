when:
  and:
    - << pipeline.parameters.run_delivery_beta >>
    - or:
        - equal: [main, << pipeline.git.branch >>]
        - matches:
            pattern: "^(release|hotfix)-.*"
            value: << pipeline.git.branch >>
jobs:
  - bump-version:
      context: deliverino
  - install:
      requires:
        - bump-version
  - build-js
  - compile-translations:
      requires:
        - install
  - e2e:
      persist_docs: true
      requires:
        - build-js
        - compile-translations
  - build-package:
      requires:
        - install
        - build-js
        - e2e
  - publish-package:
      name: publish-beta-package
      context: pypi-test
      requires:
        - build-package
  - deploy-user-manual:
      context: deliverino
      requires:
        - e2e
  - create-release:
      context: deliverino
      requires:
        - publish-beta-package
