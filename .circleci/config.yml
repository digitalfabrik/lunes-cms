commands:
    activate-venv:
        steps:
            - run:
                command: echo "source .venv/bin/activate" >> $BASH_ENV
                name: Activate virtual environment
    configure-deliverino:
        steps:
            - run:
                command: |
                    TOKEN=$(./.circleci/scripts/get_access_token.py)
                    echo "export DELIVERINO_ACCESS_TOKEN=$TOKEN" >> $BASH_ENV
                name: Request installation access token to authorize as Deliverino app
            - run:
                command: |
                    git config user.name "deliverino[bot]"
                    git config user.email "62934656+deliverino[bot]@users.noreply.github.com"
                    git remote set-url origin "https://x-access-token:${DELIVERINO_ACCESS_TOKEN}@github.com/digitalfabrik/lunes-cms.git"
                name: Configure git to commit & push as Deliverino app
    notify:
        description: Send a notification (to Mattermost) at the end of a job, based on success or failure. Must be the last step in a job.
        parameters:
            allow_all_branches:
                default: false
                type: boolean
            channel:
                default: lunes-notifications
                type: string
            failure_mentions:
                default: ""
                type: string
            success_mentions:
                default: ""
                type: string
            success_message:
                default: ""
                type: string
        steps:
            - run:
                command: |
                    echo 'export MM_MESSAGE=":fire: [${CIRCLE_JOB}](${CIRCLE_BUILD_URL}) failed on branch ${CIRCLE_BRANCH}! :fire: << parameters.failure_mentions >>"' >> $BASH_ENV
                name: Mattermost - Prepare failure message
                when: on_fail
            - run:
                command: echo 'export MM_MESSAGE="<< parameters.success_message >>"' >> $BASH_ENV
                name: Mattermost - Prepare success message
                when: on_success
            - run:
                command: scripts/notify-mattermost << parameters.channel >> << parameters.allow_all_branches >>
                name: Mattermost Status Alert
                when: always
                working_directory: ~/project
