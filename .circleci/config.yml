orbs:
    qlty: qltysh/qlty-orb@0.0.10
    shellcheck: circleci/shellcheck@2.2.4
parameters:
    run_commit:
        default: true
        type: boolean
    run_commit_main:
        default: run_if_on_main
        enum:
            - run_if_on_main
            - run
            - skip
        type: enum
    run_delivery_beta:
        default: false
        type: boolean
    run_promotion:
        default: false
        type: boolean
version: 2.1
workflows:
    commit:
        jobs:
            - shellcheck/check:
                dir: ./tools
                external_sources: true
            - install
            - lint-ts
            - build-js
            - compile-translations:
                requires:
                    - install
            - pylint:
                requires:
                    - install
            - test:
                requires:
                    - compile-translations
            - test-python313
            - upload-test-coverage:
                context: codeclimate-lunes-cms
                requires:
                    - test
            - black:
                requires:
                    - install
            - isort:
                requires:
                    - install
            - mypy:
                requires:
                    - install
            - check-translations:
                requires:
                    - install
            - build-documentation:
                requires:
                    - install
        when:
            and:
                - << pipeline.parameters.run_commit >>
                - not:
                    equal:
                        - main
                        - << pipeline.git.branch >>
    commit_main:
        jobs:
            - install
            - build-js
            - compile-translations:
                requires:
                    - install
            - e2e:
                requires:
                    - compile-translations
        when:
            or:
                - equal:
                    - << pipeline.parameters.run_commit_main >>
                    - run
                - and:
                    - equal:
                        - << pipeline.parameters.run_commit_main >>
                        - run_if_on_main
                    - equal:
                        - main
                        - << pipeline.git.branch >>
    delivery_beta:
        jobs:
            - bump-version:
                context: deliverino
            - install:
                requires:
                    - bump-version
            - build-js
            - compile-translations:
                requires:
                    - install
            - e2e:
                persist_docs: true
                requires:
                    - compile-translations
            - build-package:
                requires:
                    - install
                    - build-js
                    - e2e
            - publish-package:
                context: pypi-test
                name: publish-beta-package
                requires:
                    - build-package
            - deploy-user-manual:
                context: deliverino
                requires:
                    - e2e
            - create-release:
                context: deliverino
                requires:
                    - publish-beta-package
        when: << pipeline.parameters.run_delivery_beta >>
    promotion:
        jobs:
            - publish-release-artifact:
                context: pypi
            - promote-release:
                context: deliverino
                requires:
                    - publish-release-artifact
        when: << pipeline.parameters.run_promotion >>

