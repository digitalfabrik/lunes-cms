{% extends "admin/change_list.html" %}
{% load i18n %}

{% block content %}
<div class="col-12 mb-5">
    <ul class="nav nav-tabs" style="border-bottom: none;">
        <li class="nav-item">
            <a class="nav-link{% if active_tab == 'PENDING' %} active{% endif %}"
               href="?tab=PENDING">
                {% trans "Pending Review" %}
                <span class="ml-2 badge badge-secondary">{{ status_counts.PENDING }}</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link{% if active_tab == 'APPROVED' %} active{% endif %}"
               href="?tab=APPROVED">
                {% trans "Approved" %}
                <span class="ml-2 badge badge-secondary">{{ status_counts.APPROVED }}</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link{% if active_tab == 'REJECTED' %} active{% endif %}"
               href="?tab=REJECTED">
                {% trans "Rejected" %}
                <span class="ml-2 badge badge-secondary">{{ status_counts.REJECTED }}</span>
            </a>
        </li>
    </ul>
</div>
{{ block.super }}
{% endblock %}
